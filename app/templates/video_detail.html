{% extends "base.html" %}
{% block title %}Detalhe — Drive → Vimeo Sync{% endblock %}
{% block page_title %}Detalhe do Vídeo{% endblock %}

{% block content %}
<div id="video-detail">
    <p class="text-gray-500">Carregando...</p>
</div>
{% endblock %}

{% block scripts %}
<script>
const isAdmin='{{user.role}}'==='admin';
const videoId='{{video_id}}';

async function loadDetail(){
    const r=await apiCall(`/api/v1/videos/${videoId}`);
    if(!r)return;
    const v=await r.json();
    const container=document.getElementById('video-detail');

    const vimeoLink=v.vimeo_uri?`<a href="https://vimeo.com/manage${v.vimeo_uri}" target="_blank" class="text-brand-400 hover:text-brand-300 inline-flex items-center gap-1">${v.vimeo_uri} <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg></a>`:'<span class="text-gray-500">—</span>';

    container.innerHTML=`
    <div class="glass-card p-6 mb-6">
        <div class="flex items-start justify-between mb-6">
            <div>
                <h3 class="text-xl font-bold text-white mb-1">${v.filename}</h3>
                <p class="text-sm text-gray-400 font-mono">${v.relative_path}</p>
            </div>
            <div>${statusBadge(v.status)}</div>
        </div>
        <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
            <div class="p-3 rounded-lg bg-surface-800/50"><p class="text-xs text-gray-500 mb-1">Drive ID</p><p class="text-sm text-gray-300 font-mono truncate">${v.drive_file_id}</p></div>
            <div class="p-3 rounded-lg bg-surface-800/50"><p class="text-xs text-gray-500 mb-1">Vimeo</p><p class="text-sm">${vimeoLink}</p></div>
            <div class="p-3 rounded-lg bg-surface-800/50"><p class="text-xs text-gray-500 mb-1">Tamanho</p><p class="text-sm text-gray-300">${formatSize(v.file_size)}</p></div>
            <div class="p-3 rounded-lg bg-surface-800/50"><p class="text-xs text-gray-500 mb-1">Checksum</p><p class="text-sm text-gray-300 font-mono truncate">${v.checksum||'—'}</p></div>
            <div class="p-3 rounded-lg bg-surface-800/50"><p class="text-xs text-gray-500 mb-1">Tentativas</p><p class="text-sm text-gray-300">${v.retry_count}</p></div>
            <div class="p-3 rounded-lg bg-surface-800/50"><p class="text-xs text-gray-500 mb-1">Atualizado</p><p class="text-sm text-gray-300">${formatDate(v.updated_at)}</p></div>
        </div>
    </div>

    ${v.status==='ERROR'&&v.last_error?`
    <div class="glass-card p-6 mb-6 border-red-500/20">
        <h4 class="text-sm font-semibold text-red-400 mb-3 flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Último Erro</h4>
        <pre class="text-sm text-red-300 bg-red-950/30 p-4 rounded-lg overflow-x-auto font-mono">${v.last_error}</pre>
        ${isAdmin?`<div class="mt-4 text-right"><button onclick="retryV()" class="px-4 py-2 bg-brand-600/80 hover:bg-brand-500 text-white text-sm font-medium rounded-lg transition-all">Retry Manual</button></div>`:''}
    </div>`:''}

    <div class="glass-card p-6">
        <h4 class="text-sm font-semibold text-gray-200 mb-5 flex items-center gap-2"><svg class="w-4 h-4 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Histórico de Estados</h4>
        <div class="relative pl-6 border-l-2 border-surface-700/50 space-y-4">
            ${(v.history||[]).map((h,i)=>{
                const isLast=i===v.history.length-1;
                const dotColor=h.to_status==='SUCCESS'?'bg-emerald-400':h.to_status==='ERROR'?'bg-red-400':'bg-brand-400';
                return `<div class="relative"><div class="absolute -left-[1.6rem] top-1 w-3 h-3 rounded-full ${dotColor} ${isLast?'ring-4 ring-'+dotColor.replace('bg-','').replace('-400','-400/20'):''}"></div><div class="pb-1"><div class="flex items-center gap-3"><span class="text-xs text-gray-500">${formatDate(h.created_at)}</span>${statusBadge(h.to_status)}</div>${h.message?`<p class="text-xs text-gray-400 mt-1">${h.message}</p>`:''}</div></div>`;
            }).join('')}
        </div>
    </div>`;
}

async function retryV(){
    const r=await apiCall(`/api/v1/admin/videos/${videoId}/retry`,{method:'POST'});
    if(r){showToast('Retry agendado','success');setTimeout(loadDetail,2000);}
}

loadDetail();
setInterval(loadDetail,30000);
</script>
{% endblock %}
